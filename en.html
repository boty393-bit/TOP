<body>

<div class="container">
  <div class="header">
    <div class="badge">100% Offline</div>
    <h1>TOTP Generator</h1>
    <p>Local 2FA codes — no server, no login</p>
  </div>

  <!-- Add Key -->
  <div class="card" id="addCard">
    <label for="nameInput">Name / Service</label>
    <input type="text" id="nameInput" placeholder="e.g. GitHub, Google …">

    <div style="margin-top: 14px;">
      <label for="secretInput">Secret Key (Base32)</label>
      <input type="text" id="secretInput" placeholder="JBSWY3DPEHPK3PXP" autocomplete="off" spellcheck="false">
    </div>

    <div class="row">
      <div>
        <label for="digitsSelect">Digits</label>
        <select id="digitsSelect">
          <option value="6" selected>6</option>
          <option value="8">8</option>
        </select>
      </div>
      <div>
        <label for="periodSelect">Interval</label>
        <select id="periodSelect">
          <option value="30" selected>30s</option>
          <option value="60">60s</option>
        </select>
      </div>
    </div>

    <div style="margin-top: 18px;">
      <button class="btn btn-primary" id="addBtn" onclick="addEntry()">Add</button>
    </div>
  </div>

  <!-- Saved Entries -->
  <div class="entries" id="entriesList"></div>

  <!-- Code Output -->
  <div class="card output" id="outputCard">
    <div class="code-label" id="outputLabel">—</div>
    <div class="code-display" id="codeDisplay" onclick="copyCode()">------</div>
    <div class="timer-bar-track">
      <div class="timer-bar" id="timerBar"></div>
    </div>
    <div class="timer-text" id="timerText">—</div>
  </div>

  <div class="info">
    Everything runs locally in your browser.<br>
    Click the code to copy.
  </div>
</div>

<div class="copied-toast" id="toast">Copied!</div>

<script>
// ── Base32 decode ──
function base32Decode(str) {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  str = str.replace(/[\s=-]/g, '').toUpperCase();
  let bits = '';
  for (const c of str) {
    const val = alphabet.indexOf(c);
    if (val === -1) continue;
    bits += val.toString(2).padStart(5, '0');
  }
  const bytes = new Uint8Array(Math.floor(bits.length / 8));
  for (let i = 0; i < bytes.length; i++) {
    bytes[i] = parseInt(bits.slice(i * 8, i * 8 + 8), 2);
  }
  return bytes;
}

// ── HMAC-SHA1 (pure JS) ──
async function hmacSha1(keyBytes, msgBytes) {
  const key = await crypto.subtle.importKey('raw', keyBytes, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, msgBytes);
  return new Uint8Array(sig);
}

// ── TOTP ──
async function generateTOTP(secret, period = 30, digits = 6) {
  const keyBytes = base32Decode(secret);
  const epoch = Math.floor(Date.now() / 1000);
  const counter = Math.floor(epoch / period);

  const counterBytes = new Uint8Array(8);
  let tmp = counter;
  for (let i = 7; i >= 0; i--) {
    counterBytes[i] = tmp & 0xff;
    tmp = Math.floor(tmp / 256);
  }

  const hmac = await hmacSha1(keyBytes, counterBytes);
  const offset = hmac[hmac.length - 1] & 0x0f;
  const code = (
    ((hmac[offset] & 0x7f) << 24) |
    ((hmac[offset + 1] & 0xff) << 16) |
    ((hmac[offset + 2] & 0xff) << 8) |
    (hmac[offset + 3] & 0xff)
  ) % Math.pow(10, digits);

  return code.toString().padStart(digits, '0');
}

// ── State ──
let entries = [];
let activeIndex = -1;
let tickInterval = null;

function addEntry() {
  const name = document.getElementById('nameInput').value.trim() || 'Unnamed';
  const secret = document.getElementById('secretInput').value.trim();
  if (!secret) { document.getElementById('secretInput').focus(); return; }

  const digits = parseInt(document.getElementById('digitsSelect').value);
  const period = parseInt(document.getElementById('periodSelect').value);

  entries.push({ name, secret, digits, period });
  activeIndex = entries.length - 1;

  document.getElementById('nameInput').value = '';
  document.getElementById('secretInput').value = '';

  renderEntries();
  startTick();
}

function selectEntry(idx) {
  activeIndex = idx;
  renderEntries();
  startTick();
}

function removeEntry(idx, e) {
  e.stopPropagation();
  entries.splice(idx, 1);
  if (entries.length === 0) {
    activeIndex = -1;
    stopTick();
    document.getElementById('outputCard').classList.remove('active');
  } else {
    if (activeIndex >= entries.length) activeIndex = entries.length - 1;
  }
  renderEntries();
  if (activeIndex >= 0) startTick();
}

function renderEntries() {
  const list = document.getElementById('entriesList');
  list.innerHTML = entries.map((e, i) => `
    <div class="entry-item ${i === activeIndex ? 'active' : ''}" onclick="selectEntry(${i})">
      <span class="entry-name">${esc(e.name)}</span>
      <button class="entry-remove" onclick="removeEntry(${i}, event)">×</button>
    </div>
  `).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Timer ──
function startTick() {
  if (tickInterval) clearInterval(tickInterval);
  document.getElementById('outputCard').classList.add('active');
  tick();
  tickInterval = setInterval(tick, 1000);
}

function stopTick() {
  if (tickInterval) clearInterval(tickInterval);
  tickInterval = null;
}

async function tick() {
  if (activeIndex < 0 || activeIndex >= entries.length) return;
  const entry = entries[activeIndex];
  const { secret, period, digits } = entry;

  try {
    const code = await generateTOTP(secret, period, digits);
    document.getElementById('codeDisplay').textContent = code;
    document.getElementById('outputLabel').textContent = entry.name;
  } catch {
    document.getElementById('codeDisplay').textContent = 'ERROR';
    document.getElementById('outputLabel').textContent = 'Invalid Key';
  }

  const epoch = Math.floor(Date.now() / 1000);
  const remaining = period - (epoch % period);
  const pct = (remaining / period) * 100;

  const bar = document.getElementById('timerBar');
  bar.style.width = pct + '%';
  bar.classList.toggle('urgent', remaining <= 5);

  document.getElementById('timerText').textContent = remaining + 's';
}

// ── Copy ──
function copyCode() {
  const code = document.getElementById('codeDisplay').textContent;
  if (!code || code === 'ERROR') return;
  navigator.clipboard.writeText(code).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  });
}
</script>
